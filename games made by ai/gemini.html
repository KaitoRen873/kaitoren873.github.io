<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON RUSH: ADVANCED</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05050a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: #0a0a14;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 10, 0.85);
            color: #fff;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 3rem;
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-align: center;
        }
        p {
            font-size: 1.2rem;
            color: #8a8a9e;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: transparent;
            color: #ff007f;
            border: 2px solid #ff007f;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            transition: all 0.2s ease;
        }
        button:hover, button:active {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 20px #ff007f;
            transform: scale(1.05);
        }
        /* Mobile Controls HUD */
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 5;
            pointer-events: none;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        .btn:active {
            background: rgba(0, 255, 204, 0.4);
            border-color: #0ff;
        }
        @media (max-width: 768px) {
            #mobileControls { display: flex; }
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="startScreen" class="overlay">
        <h1>NEON RUSH</h1>
        <p>PC: UP/W to Jump, DOWN/S to Slide, SPACE to Shoot.<br>Mobile: Use on-screen buttons.</p>
        <button onclick="startGame()">Start Mission</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: #ff007f; text-shadow: 0 0 10px #ff007f;">MISSION FAILED</h1>
        <p id="finalScore">Score: 0 | Level: 1</p>
        <button onclick="startGame()">Retry</button>
    </div>

    <div id="mobileControls">
        <div style="display: flex; gap: 15px;">
            <div class="btn" id="btnJump">▲</div>
            <div class="btn" id="btnSlide">▼</div>
        </div>
        <div class="btn" id="btnShoot" style="border-color: #ff007f; color: #ff007f;">FIRE</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Advanced Scaling: Lock internal resolution (16:9), adaptively fit screen
    const V_WIDTH = 1280;
    const V_HEIGHT = 720;
    
    function resizeCanvas() {
        const windowRatio = window.innerWidth / window.innerHeight;
        const targetRatio = V_WIDTH / V_HEIGHT;
        
        if (windowRatio < targetRatio) {
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
        } else {
            canvas.style.width = 'auto';
            canvas.style.height = '100%';
        }
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Game State Engine
    let state = {
        running: false,
        score: 0,
        gameSpeed: 8,
        level: 1,
        distanceToNextLevel: 1000
    };

    // Player Object with advanced physics states
    const player = {
        x: 150,
        y: 500,
        width: 50,
        height: 80,
        baseHeight: 80,
        slideHeight: 40,
        vy: 0,
        gravity: 1.2,
        jumpForce: -22,
        isGrounded: false,
        isSliding: false,
        slideTimer: 0,
        color: '#00ffcc',
        shootCooldown: 0,
        update() {
            // Apply physics
            this.vy += this.gravity;
            this.y += this.vy;

            // Ground collision detection
            const groundY = V_HEIGHT - 120 - this.height;
            if (this.y >= groundY) {
                this.y = groundY;
                this.vy = 0;
                this.isGrounded = true;
            } else {
                this.isGrounded = false;
            }

            // Slide mechanics
            if (this.isSliding) {
                this.slideTimer--;
                if (this.slideTimer <= 0) {
                    this.standUp();
                }
            }

            if (this.shootCooldown > 0) this.shootCooldown--;
        },
        jump() {
            if (this.isGrounded && !this.isSliding) {
                this.vy = this.jumpForce;
                this.isGrounded = false;
                spawnParticles(this.x + this.width/2, this.y + this.height, '#0ff', 15);
            }
        },
        slide() {
            if (this.isGrounded && !this.isSliding) {
                this.isSliding = true;
                this.height = this.slideHeight;
                this.y += this.baseHeight - this.slideHeight;
                this.slideTimer = 35; // Frames duration
                spawnParticles(this.x + this.width/2, this.y + this.height, '#ff007f', 8);
            }
        },
        standUp() {
            this.isSliding = false;
            this.y -= this.baseHeight - this.slideHeight;
            this.height = this.baseHeight;
        },
        shoot() {
            if (this.shootCooldown === 0) {
                projectiles.push(new Projectile(this.x + this.width, this.y + this.height / 2));
                this.shootCooldown = 15; // Fire rate throttling
                spawnParticles(this.x + this.width, this.y + this.height/2, '#00ffff', 5);
            }
        },
        draw() {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            
            // Draw a stylish neon agent profile
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Visor accent
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x + this.width - 15, this.y + 10, 15, 10);
            ctx.restore();
        }
    };

    // Arrays for object pooling / lifecycle management
    let obstacles = [];
    let projectiles = [];
    let particles = [];
    let backgroundLines = [];

    // Advanced Object-Oriented Entities
    class Obstacle {
        constructor() {
            this.type = Math.random() > 0.5 ? 'tall' : 'wide';
            this.x = V_WIDTH + 100;
            this.speed = state.gameSpeed;
            this.hp = this.type === 'tall' ? 2 : 1;

            if (this.type === 'tall') {
                this.width = 40;
                this.height = 90;
                this.y = V_HEIGHT - 120 - this.height; // Ground based
                this.color = '#ff0055';
            } else {
                this.width = 70;
                this.height = 40;
                this.y = V_HEIGHT - 220; // Floating / Airborne
                this.color = '#ffcc00';
            }
        }
        update() {
            this.x -= state.gameSpeed;
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.restore();
        }
    }

    class Projectile {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 20;
            this.height = 6;
            this.speed = 16;
        }
        update() { this.x += this.speed; }
        draw() {
            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffff00';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 4 + 1;
            this.vx = (Math.random() - 0.5) * 6 - 2;
            this.vy = (Math.random() - 0.5) * 6;
            this.alpha = 1;
            this.decay = Math.random() * 0.02 + 0.01;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.restore();
        }
    }

    // Helper functions
    function spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
    }

    // Setup environmental parallax grid lines
    function initBackground() {
        backgroundLines = [];
        for (let i = 0; i < 20; i++) {
            backgroundLines.push({
                x: Math.random() * V_WIDTH,
                y: Math.random() * (V_HEIGHT - 200),
                length: Math.random() * 80 + 40,
                speed: Math.random() * 2 + 0.5
            });
        }
    }

    let obstacleTimer = 0;

    function startGame() {
        // Reset full game parameters
        state = { running: true, score: 0, gameSpeed: 8, level: 1, distanceToNextLevel: 1000 };
        player.y = 400;
        player.standUp();
        obstacles = [];
        projectiles = [];
        particles = [];
        obstacleTimer = 0;
        initBackground();

        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        
        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        state.running = false;
        document.getElementById('finalScore').innerText = `Score: ${state.score} | Level: ${state.level}`;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    // Collision math engine
    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    // --- INPUT SYSTEMS ---
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if ((e.code === 'ArrowUp' || e.code === 'KeyW')) player.jump();
        if ((e.code === 'ArrowDown' || e.code === 'KeyS')) player.slide();
        if (e.code === 'Space' && state.running) { e.preventDefault(); player.shoot(); }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Mobile Event Bindings
    document.getElementById('btnJump').addEventListener('touchstart', (e) => { e.preventDefault(); player.jump(); });
    document.getElementById('btnSlide').addEventListener('touchstart', (e) => { e.preventDefault(); player.slide(); });
    document.getElementById('btnShoot').addEventListener('touchstart', (e) => { e.preventDefault(); player.shoot(); });

    // --- MAIN GAME LOOP ENGINE ---
    function gameLoop() {
        if (!state.running) return;

        // 1. Clear & Background Rendering
        ctx.fillStyle = '#05050a';
        ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);

        // Parallax Stars / Lines
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
        ctx.lineWidth = 2;
        backgroundLines.forEach(line => {
            line.x -= line.speed;
            if (line.x + line.length < 0) line.x = V_WIDTH;
            ctx.beginPath();
            ctx.moveTo(line.x, line.y);
            ctx.lineTo(line.x + line.length, line.y);
            ctx.stroke();
        });

        // Cyberpunk Ground Grid Lines
        ctx.fillStyle = '#111126';
        ctx.fillRect(0, V_HEIGHT - 120, V_WIDTH, 120);
        ctx.strokeStyle = '#ff007f';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, V_HEIGHT - 120);
        ctx.lineTo(V_WIDTH, V_HEIGHT - 120);
        ctx.stroke();

        // 2. Spawn Mechanisms (Dynamic difficulty)
        obstacleTimer--;
        if (obstacleTimer <= 0) {
            obstacles.push(new Obstacle());
            obstacleTimer = Math.max(45, 100 - (state.level * 6)) + Math.random() * 40; 
        }

        // 3. Update & Draw Dynamic Objects
        player.update();
        player.draw();

        // Handle Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.update();
            p.draw();

            // Clear offscreen bullets
            if (p.x > V_WIDTH) projectiles.splice(i, 1);
        }

        // Handle Obstacles & Collisions
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.update();
            o.draw();

            // Check collision with player
            if (checkCollision(player, o)) {
                spawnParticles(player.x + 25, player.y + 25, '#ff0000', 40);
                endGame();
                return;
            }

            // Check bullet impacts
            for (let j = projectiles.length - 1; j >= 0; j--) {
                if (checkCollision(projectiles[j], o)) {
                    projectiles.splice(j, 1);
                    o.hp--;
                    spawnParticles(o.x, o.y + o.height/2, o.color, 8);
                    if (o.hp <= 0) {
                        spawnParticles(o.x + o.width/2, o.y + o.height/2, o.color, 20);
                        obstacles.splice(i, 1);
                        state.score += 150;
                        break;
                    }
                }
            }

            // Clean out old obstacles off-screen
            if (o && o.x + o.width < 0) {
                obstacles.splice(i, 1);
                state.score += 50; // Points for dodging successfully
            }
        }

        // Handle Visual Particles FX
        for (let i = particles.length - 1; i >= 0; i--) {
            let pt = particles[i];
            pt.update();
            pt.draw();
            if (pt.alpha <= 0) particles.splice(i, 1);
        }

        // 4. Progression System & Score UI
        state.distanceToNextLevel -= state.gameSpeed * 0.1;
        if (state.distanceToNextLevel <= 0) {
            state.level++;
            state.gameSpeed += 1.5;
            state.distanceToNextLevel = 1000 + (state.level * 200);
            spawnParticles(V_WIDTH / 2, V_HEIGHT / 2, '#00ffcc', 50);
        }

        // Heads Up Display (HUD) Rendering
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Courier New';
        ctx.fillText(`SCORE: ${String(state.score).padStart(6, '0')}`, 30, 45);
        ctx.fillStyle = '#0ff';
        ctx.fillText(`LEVEL: ${state.level}`, 30, 80);

        requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
