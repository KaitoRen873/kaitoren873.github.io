<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FNAF: Security Office</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* ─── reset & base ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'VT323', monospace;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* ─── container ─── */
        #game-container {
            position: relative;
            width: 960px;
            height: 700px;
            background: #000;
            border: 4px solid #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 0 70px rgba(0, 0, 0, 0.9), 0 0 0 2px #111;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── start screen ─── */
        #start-screen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            transition: opacity 0.6s;
            background: radial-gradient(ellipse at 50% 30%, #1a0a0a 0%, #000 90%);
        }
        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .start-title {
            font-size: 70px;
            letter-spacing: 12px;
            text-shadow: 0 0 40px #ff4444, 0 0 80px #aa0000;
            margin-bottom: 6px;
            animation: titlePulse 2s infinite;
        }
        @keyframes titlePulse {
            0%,
            100% {
                text-shadow: 0 0 40px #ff4444, 0 0 80px #aa0000;
            }
            50% {
                text-shadow: 0 0 70px #ff0000, 0 0 120px #cc0000;
            }
        }
        .start-sub {
            font-size: 26px;
            color: #aaa;
            margin-bottom: 30px;
            letter-spacing: 6px;
        }
        .start-night-select {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .night-select-btn {
            font-family: 'VT323', monospace;
            font-size: 20px;
            padding: 8px 22px;
            background: #1a0a0a;
            border: 2px solid #442222;
            color: #aa6666;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.25s;
            letter-spacing: 2px;
        }
        .night-select-btn:hover {
            background: #2a0a0a;
            border-color: #884444;
            color: #ffaaaa;
        }
        .night-select-btn.active {
            background: #3a0a0a;
            border-color: #cc4444;
            color: #ff6666;
            box-shadow: 0 0 25px rgba(200, 50, 50, 0.4);
        }
        #start-btn {
            font-family: 'VT323', monospace;
            font-size: 30px;
            padding: 14px 48px;
            background: #1a0000;
            border: 2px solid #aa0000;
            color: #ff6666;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.25s;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.25);
            border-radius: 4px;
        }
        #start-btn:hover {
            background: #330000;
            border-color: #ff0000;
            color: #fff;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.5);
            transform: scale(1.02);
        }

        /* ─── HUD ─── */
        #hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 22px;
            background: #0d0d12;
            border-bottom: 3px solid #1a1a1a;
            z-index: 10;
            height: 52px;
            gap: 16px;
            flex-shrink: 0;
        }
        .hud-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .night-label {
            color: #888;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .night-label .night-num {
            color: #ff8844;
        }
        .time-display {
            color: #fff;
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
            min-width: 100px;
            text-align: center;
        }
        .power-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .power-label {
            color: #aaa;
            font-size: 14px;
            letter-spacing: 2px;
        }
        #power-bar-outer {
            width: 150px;
            height: 16px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 4px;
            overflow: hidden;
        }
        #power-bar-inner {
            height: 100%;
            background: #4ec94e;
            transition: width 0.35s, background 0.5s;
            border-radius: 2px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }
        #power-bar-inner.warning {
            background: #c9b84e;
        }
        #power-bar-inner.danger {
            background: #c94e4e;
            animation: powerPulse 0.6s infinite;
        }
        @keyframes powerPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }
        #power-text {
            color: #ccc;
            font-size: 16px;
            font-weight: bold;
            min-width: 44px;
            text-align: right;
        }

        /* ─── office ─── */
        #office {
            flex: 1;
            display: flex;
            position: relative;
            background: #0b0b12;
            background-image: radial-gradient(ellipse at 50% 120%, #1a1a24 0%, #0a0a10 70%);
            overflow: hidden;
            min-height: 0;
        }

        /* hallway */
        .hallway {
            position: relative;
            width: 170px;
            background: #050508;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            z-index: 2;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9);
            flex-shrink: 0;
        }
        .hall-depth {
            flex: 1;
            width: 100%;
            background: linear-gradient(to bottom, #030306 0%, #0a0a12 40%, #14141e 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hall-walls {
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0, 0, 0, 0.3) 40px, rgba(0, 0, 0, 0.3) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0, 0, 0, 0.2) 40px, rgba(0, 0, 0, 0.2) 41px);
        }
        .light-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 100%, rgba(255, 210, 100, 0.35), transparent 70%);
            opacity: 0;
            transition: opacity 0.12s;
            pointer-events: none;
            z-index: 5;
        }
        .light-overlay.on {
            opacity: 1;
        }

        /* animatronic in hallway */
        .animatronic {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 100px;
            opacity: 0;
            transition: opacity 0.35s, transform 0.4s, width 0.3s, height 0.3s, bottom 0.3s;
            pointer-events: none;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .animatronic.visible {
            opacity: 0.92;
            animation: animBob 3.2s ease-in-out infinite;
        }
        /* at-door silhouette when light is off */
        .animatronic.silhouette {
            opacity: 0.45;
            filter: brightness(0.3) contrast(1.2);
            animation: animBob 3.2s ease-in-out infinite;
        }
        .animatronic.near {
            width: 82px;
            height: 160px;
            bottom: 4px;
        }
        .animatronic.retreating {
            animation: retreatAnim 0.6s ease-out forwards;
        }
        @keyframes retreatAnim {
            0% {
                opacity: 0.9;
                transform: translateX(-50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) scale(0.3) translateY(30px);
            }
        }
        .anim-body {
            width: 100%;
            height: 100%;
            border-radius: 30% 30% 10% 10%;
            position: relative;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
        }
        #left-animatronic .anim-body {
            background: linear-gradient(to bottom, #3a2a5a, #1a0a2a);
            border-top: 12px solid #2a1a4a;
            border-radius: 25% 25% 10% 10%;
        }
        #left-animatronic .anim-body::after {
            content: "";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 18px;
            background: #2a1a3a;
            border-radius: 50% 50% 0 0;
        }
        #right-animatronic:not(.freddy) .anim-body {
            background: linear-gradient(to bottom, #4a4a2a, #2a2a0a);
            border-top: 10px solid #3a3a20;
        }
        #right-animatronic.freddy .anim-body {
            background: linear-gradient(to bottom, #4a3020, #2a1a10);
            border-top: 14px solid #3a2820;
            border-radius: 20% 20% 10% 10%;
        }
        #right-animatronic.freddy .anim-body::after {
            content: "";
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 16px;
            background: #2a1a12;
            border-radius: 4px 4px 0 0;
            box-shadow: 0 2px 0 #1a0a06;
        }
        .anim-eyes {
            position: absolute;
            top: 26%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
        }
        .anim-eye {
            width: 11px;
            height: 13px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.85);
            animation: eyeBlink 4.2s infinite;
        }
        .near .anim-eye {
            width: 15px;
            height: 17px;
        }
        @keyframes eyeBlink {
            0%,
            88%,
            100% {
                opacity: 1;
            }
            92% {
                opacity: 0.08;
            }
        }
        @keyframes animBob {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            30% {
                transform: translateX(-50%) translateY(-4px);
            }
            70% {
                transform: translateX(-50%) translateY(3px);
            }
        }

        /* door */
        .door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #3a3a48 0%, #2a2a38 30%, #3a3a48 60%, #2a2a38 100%);
            z-index: 6;
            transform: translateY(-105%);
            transition: transform 0.3s cubic-bezier(0.34, 1.0, 0.64, 1.0);
            border-bottom: 6px solid #555;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
            background-image: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 2px, transparent 2px, transparent 4px);
        }
        .door.closed {
            transform: translateY(0);
        }
        .door-stripe {
            position: absolute;
            left: 15%;
            right: 15%;
            height: 8px;
            background: #4a4a58;
            border-radius: 4px;
        }
        .door-stripe:nth-child(2) {
            top: 22%;
        }
        .door-stripe:nth-child(3) {
            top: 45%;
        }
        .door-stripe:nth-child(4) {
            top: 68%;
        }
        .door-handle-area {
            position: absolute;
            right: 10px;
            top: 40%;
            width: 12px;
            height: 40px;
            background: #5a5a6a;
            border-radius: 6px;
            box-shadow: inset 0 0 6px #000;
        }

        .door-window {
            position: absolute;
            top: 14%;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 52px;
            background: rgba(5, 5, 10, 0.92);
            border: 3px solid #444;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .window-animatronic {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .window-animatronic.visible {
            opacity: 1;
        }
        .window-animatronic .anim-body-small {
            width: 30px;
            height: 42px;
            border-radius: 30% 30% 20% 20%;
            background: linear-gradient(to bottom, #2a1a3a, #1a0a2a);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            animation: windowBob 2.5s ease-in-out infinite;
            position: relative;
        }
        .window-animatronic .anim-body-small .anim-eyes {
            top: 30%;
            gap: 5px;
        }
        .window-animatronic .anim-body-small .anim-eye {
            width: 5px;
            height: 6px;
        }
        @keyframes windowBob {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-2px);
            }
            70% {
                transform: translateY(2px);
            }
        }
        .window-animatronic.freddy .anim-body-small {
            background: linear-gradient(to bottom, #3a2a1a, #1a100a);
            border-top: 5px solid #3a2820;
            border-radius: 20% 20% 10% 10%;
        }
        .window-animatronic.freddy .anim-body-small::after {
            content: "";
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 8px;
            background: #2a1a12;
            border-radius: 2px 2px 0 0;
        }

        /* center office */
        #center-office {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            min-width: 0;
        }
        #desk {
            position: absolute;
            bottom: 0;
            width: 70%;
            height: 32%;
            background: linear-gradient(to top, #1a1a22, #222230);
            border-radius: 10px 10px 0 0;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #monitor {
            width: 120px;
            height: 88px;
            background: #0a0a10;
            border: 6px solid #2a2a35;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        #monitor::after {
            content: "";
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.04) 0px, rgba(0, 255, 0, 0.04) 2px, transparent 2px, transparent 4px);
            border-radius: 2px;
            animation: staticFlicker 0.12s infinite;
        }
        @keyframes staticFlicker {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.7;
            }
        }
        #ceiling-fan {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 8px;
            background: #2a2a35;
            border-radius: 5px;
            animation: fanSpin 2.8s linear infinite;
        }
        @keyframes fanSpin {
            from {
                transform: translateX(-50%) rotate(0deg);
            }
            to {
                transform: translateX(-50%) rotate(360deg);
            }
        }

        /* ─── controls ─── */
        #controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 18px;
            background: #0d0d12;
            border-top: 3px solid #1a1a1a;
            z-index: 10;
            height: 66px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .ctrl-btn {
            padding: 8px 16px;
            background: #1a1a25;
            color: #ccc;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 17px;
            letter-spacing: 2px;
            transition: all 0.2s;
            min-width: 56px;
            text-align: center;
            box-shadow: inset 0 1px 0 #3a3a4a;
            position: relative;
        }
        .ctrl-btn:hover {
            background: #2e2e3d;
            border-color: #666;
            color: #fff;
        }
        .ctrl-btn:active {
            background: #3a3a4d;
            transform: scale(0.94);
        }
        .ctrl-btn.active-btn {
            background: #3a2030;
            border-color: #aa3060;
            color: #ffaaaa;
            box-shadow: 0 0 25px rgba(200, 50, 80, 0.5);
        }
        .key-hint {
            display: block;
            font-size: 11px;
            color: #777;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .ctrl-btn .icon {
            font-size: 18px;
        }

        /* ─── camera overlay ─── */
        #camera-overlay {
            position: absolute;
            inset: 0;
            background: #050510;
            z-index: 20;
            display: none;
            flex-direction: row;
            padding: 16px;
            backdrop-filter: blur(4px);
            gap: 12px;
        }
        #camera-overlay.active {
            display: flex;
        }
        #cam-sidebar {
            width: 140px;
            background: rgba(10, 10, 20, 0.92);
            border-right: 3px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px;
            border-radius: 8px 0 0 8px;
            flex-shrink: 0;
        }
        .cam-select-btn {
            background: #1a1a25;
            border: 2px solid #444;
            color: #aaa;
            padding: 10px 12px;
            text-align: center;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 16px;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .cam-select-btn:hover {
            background: #2a2a3a;
            border-color: #666;
            color: #fff;
        }
        .cam-select-btn.active {
            background: #2a2a40;
            border-color: #888;
            color: #fff;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.08);
        }
        #cam-main-feed {
            flex: 1;
            background: #0a0a18;
            border: 3px solid #1a1a35;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
            padding: 20px;
            min-width: 0;
        }
        #cam-main-feed::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.025) 0px, rgba(0, 255, 0, 0.025) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            border-radius: 6px;
        }
        #cam-feed-title {
            color: #ddd;
            font-size: 24px;
            letter-spacing: 5px;
            margin-bottom: 12px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            z-index: 1;
        }
        .cam-anim-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin: 5px 0;
            z-index: 1;
        }
        .cam-anim-name {
            color: #ccc;
            font-size: 17px;
            width: 70px;
            text-align: right;
        }
        .cam-anim-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #222;
            transition: 0.3s;
            box-shadow: inset 0 0 6px #000;
            border: 1px solid #444;
        }
        .cam-anim-dot.active {
            background: #ff4444;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.7);
            border-color: #ff6666;
        }
        .cam-anim-dot.at-door {
            background: #ff8800;
            box-shadow: 0 0 25px rgba(255, 136, 0, 0.8);
            border-color: #ffaa44;
        }
        .pirate-curtain {
            width: 150px;
            height: 80px;
            background: #1a1a20;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            position: relative;
            margin-top: 12px;
            font-size: 22px;
            overflow: hidden;
            border-radius: 4px;
            z-index: 1;
        }
        .pirate-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 12px;
            background: linear-gradient(90deg, #884422, #cc6644);
            transition: width 0.4s;
            box-shadow: 0 0 20px rgba(200, 80, 40, 0.5);
            border-radius: 0 4px 0 0;
        }

        /* ─── overlays ─── */
        #power-out-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #power-out-overlay.active {
            display: flex;
        }
        .po-text {
            color: #555;
            font-size: 30px;
            letter-spacing: 8px;
            animation: fadeInOut 2s infinite;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
        }
        @keyframes fadeInOut {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.9;
            }
        }

        #jumpscare-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #jumpscare-overlay.active {
            display: flex;
            animation: screenShake 0.45s;
        }
        @keyframes screenShake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-12px, 8px);
            }
            20% {
                transform: translate(10px, -6px);
            }
            30% {
                transform: translate(-8px, -10px);
            }
            40% {
                transform: translate(12px, 6px);
            }

    <script>
        // ═══════════════════════════════════════════════════════
        //  SOUND MANAGER  –  Web Audio generated sounds
        // ═══════════════════════════════════════════════════════
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.enabled = true;
            }

            init() {
                if (this.ctx) return;
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    if (this.ctx.state === 'suspended') this.ctx.resume();
                } catch (_) {}
            }

            _tone(freq, dur, vol = 0.06, type = 'square', ramp = true, delay = 0) {
                if (!this.ctx || !this.enabled) return;
                try {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.type = type;
                    o.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
                    g.gain.setValueAtTime(vol, this.ctx.currentTime + delay);
                    if (ramp) g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + delay + dur);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start(this.ctx.currentTime + delay);
                    o.stop(this.ctx.currentTime + delay + dur);
                } catch (_) {}
            }

            _noise(dur, vol = 0.08, freq = 800, delay = 0) {
                if (!this.ctx || !this.enabled) return;
                try {
                    const bufferSize = this.ctx.sampleRate * dur;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (this.ctx.sampleRate * 0.3));
                    }
                    const src = this.ctx.createBufferSource();
                    const g = this.ctx.createGain();
                    src.buffer = buffer;
                    g.gain.setValueAtTime(vol, this.ctx.currentTime + delay);
                    g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + delay + dur);
                    src.connect(g);
                    g.connect(this.ctx.destination);
                    src.start(this.ctx.currentTime + delay);
                } catch (_) {}
            }

            door() { this._tone(70, 0.25, 0.10, 'triangle'); }
            light() { this._tone(1200, 0.06, 0.04, 'sine', false); }
            cameraUp() { this._tone(900, 0.08, 0.04, 'sine', false);
                setTimeout(() => this._tone(600, 0.08, 0.04, 'sine', false), 80); }
            cameraDown() { this._tone(600, 0.08, 0.04, 'sine', false);
                setTimeout(() => this._tone(900, 0.08, 0.04, 'sine', false), 80); }
            jumpscare() {
                this._noise(0.7, 0.35, 300);
                setTimeout(() => this._tone(45, 0.6, 0.30, 'sawtooth'), 50);
                setTimeout(() => this._tone(30, 0.5, 0.25, 'square'), 200);
                setTimeout(() => this._noise(0.8, 0.40, 150), 100);
            }
            foxyRun() {
                this._tone(25, 0.5, 0.28, 'square');
                setTimeout(() => this._tone(20, 0.4, 0.25, 'square'), 120);
                setTimeout(() => this._noise(0.3, 0.20, 100), 60);
            }
            win() {
                [523, 659, 784, 1047].forEach((f, i) => {
                    setTimeout(() => this._tone(f, 0.18, 0.12, 'sine', false), i * 150);
                });
                setTimeout(() => this._tone(1047, 0.4, 0.14, 'sine', true), 450);
            }
            powerOut() { this._tone(55, 0.5, 0.06, 'sawtooth');
                setTimeout(() => this._tone(45, 0.7, 0.08, 'sawtooth'), 200); }
            ambient() {
                if (!this.ctx || !this.enabled) return;
                this._tone(48 + Math.random() * 18, 0.6, 0.015, 'sawtooth', true);
            }
            retreat() { this._tone(150, 0.15, 0.04, 'sine', false);
                setTimeout(() => this._tone(200, 0.15, 0.03, 'sine', false), 100); }
            click() { this._tone(800, 0.04, 0.025, 'sine', false); }
            // warning when animatronic enters hallway (position 2)
            warning() { this._tone(180, 0.12, 0.05, 'sawtooth', false);
                setTimeout(() => this._tone(220, 0.10, 0.04, 'sawtooth', false), 100); }
        }

        // ═══════════════════════════════════════════════════════
        //  GAME STATE
        // ═══════════════════════════════════════════════════════
        const sound = new SoundManager();

        // DOM refs
        const $ = id => document.getElementById(id);
        const timeDisplay = $('time-display');
        const nightNum = $('night-num');
        const powerBarInner = $('power-bar-inner');
        const powerText = $('power-text');
        const leftDoor = $('left-door');
        const rightDoor = $('right-door');
        const leftLightOverlay = $('left-light-overlay');
        const rightLightOverlay = $('right-light-overlay');
        const leftAnimatronic = $('left-animatronic');
        const rightAnimatronic = $('right-animatronic');
        const leftWindowAnimatronic = $('left-window-animatronic');
        const rightWindowAnimatronic = $('right-window-animatronic');
        const cameraOverlay = $('camera-overlay');
        const jumpscareOverlay = $('jumpscare-overlay');
        const powerOutOverlay = $('power-out-overlay');
        const winScreen = $('win-screen');
        const camFeedTitle = $('cam-feed-title');
        const camDynamicContent = $('cam-dynamic-content');
        const startScreen = $('start-screen');
        const startBtn = $('start-btn');
        const restartBtn = $('restart-btn');
        const winRestartBtn = $('win-restart-btn');

        const TOTAL_MINUTES = 360;
        const TICK_MS = 900;

        let game = {
            power: 100,
            minute: 0,
            night: 1,
            leftDoor: false,
            rightDoor: false,
            leftLight: false,
            rightLight: false,
            cameraUp: false,
            currentCam: 'stage',
            bonnie: 0,
            chica: 0,
            freddy: 0,
            foxy: 0,
            gameOver: false,
            gameWin: false,
            powerOut: false,
            powerOutTick: 0,
            powerOutMax: 0,
            started: false,
            leftRetreatTimer: 0,
            leftRetreatThreshold: 0,
            rightRetreatTimer: 0,
            rightRetreatThreshold: 0,
            // track last warning to avoid spam
            lastWarning: { bonnie: 0, chica: 0, freddy: 0 },
            nightConfigs: {
                1: { baseMove: 0.06, entryChance: 0.08, foxySpeed: 0.14, drainMult: 0.9 },
                2: { baseMove: 0.10, entryChance: 0.14, foxySpeed: 0.20, drainMult: 1.0 },
                3: { baseMove: 0.16, entryChance: 0.20, foxySpeed: 0.28, drainMult: 1.1 },
                4: { baseMove: 0.22, entryChance: 0.28, foxySpeed: 0.35, drainMult: 1.2 },
                5: { baseMove: 0.30, entryChance: 0.38, foxySpeed: 0.44, drainMult: 1.35 }
            }
        };

        // ─── helpers ───
        function formatTime(m) {
            let h = Math.floor(m / 60);
            let min = m % 60;
            if (h === 0) h = 12;
            return `${h}:${min.toString().padStart(2, '0')} AM`;
        }

        function getNightConfig() {
            return game.nightConfigs[game.night] || game.nightConfigs[1];
        }

        // ─── update UI ───
        function updateHUD() {
            timeDisplay.textContent = formatTime(game.minute);
            nightNum.textContent = game.night;
            let p = Math.max(0, game.power);
            powerBarInner.style.width = p + '%';
            powerText.textContent = Math.round(p) + '%';
            powerBarInner.classList.remove('warning', 'danger');
            if (p <= 15) powerBarInner.classList.add('danger');
            else if (p <= 30) powerBarInner.classList.add('warning');
        }

        function updateDoors() {
            leftDoor.classList.toggle('closed', game.leftDoor);
            rightDoor.classList.toggle('closed', game.rightDoor);
            $('left-door-btn').classList.toggle('active-btn', game.leftDoor);
            $('right-door-btn').classList.toggle('active-btn', game.rightDoor);
        }

        function updateLights() {
            const powerOk = game.power > 0 && !game.powerOut && !game.gameOver && !game.gameWin;
            leftLightOverlay.classList.toggle('on', game.leftLight && powerOk);
            rightLightOverlay.classList.toggle('on', game.rightLight && powerOk);
            $('left-light-btn').classList.toggle('active-btn', game.leftLight);
            $('right-light-btn').classList.toggle('active-btn', game.rightLight);
        }

        function updateAnimatronicVisuals() {
            // ── LEFT (Bonnie) ──
            // At position 3: always visible (silhouette if light off, full if light on)
            // At position 2: visible only with light on
            const leftAtDoor = game.bonnie === 3;
            const leftAtHall = game.bonnie === 2;
            const leftPowerOk = game.power > 0 && !game.powerOut && !game.gameOver && !game.gameWin;
            const leftDoorOpen = !game.leftDoor;
            const leftLightOn = game.leftLight && leftPowerOk;

            let leftVis = false,
                leftSilhouette = false,
                leftNear = false;

            if (leftAtDoor && leftDoorOpen && leftPowerOk) {
                leftVis = true;
                leftNear = true;
                leftSilhouette = !leftLightOn;
            } else if (leftAtHall && leftDoorOpen && leftLightOn && leftPowerOk) {
                leftVis = true;
                leftNear = false;
                leftSilhouette = false;
            }

            leftAnimatronic.classList.toggle('visible', leftVis && !leftSilhouette);
            leftAnimatronic.classList.toggle('silhouette', leftVis && leftSilhouette);
            leftAnimatronic.classList.toggle('near', leftNear);

            // ── RIGHT (Chica / Freddy) ──
            const rightAtDoor = game.chica === 3 || game.freddy === 3;
            const rightAtHall = game.chica === 2 || game.freddy === 2;
            const rightDoorOpen = !game.rightDoor;
            const rightLightOn = game.rightLight && leftPowerOk;

            let rightVis = false,
                rightSilhouette = false,
                rightNear = false,
                isFreddy = false;

            if (rightAtDoor && rightDoorOpen && leftPowerOk) {
                rightVis = true;
                rightNear = true;
                rightSilhouette = !rightLightOn;
                if (game.freddy === 3) isFreddy = true;
            } else if (rightAtHall && rightDoorOpen && rightLightOn && leftPowerOk) {
                rightVis = true;
                rightNear = false;
                rightSilhouette = false;
                if (game.freddy === 2) isFreddy = true;
            }

            rightAnimatronic.classList.toggle('visible', rightVis && !rightSilhouette);
            rightAnimatronic.classList.toggle('silhouette', rightVis && rightSilhouette);
            rightAnimatronic.classList.toggle('near', rightNear);
            rightAnimatronic.classList.toggle('freddy', isFreddy && rightVis);

            // ── WINDOWS (door closed) ──
            const leftWin = game.leftDoor && game.bonnie === 3 && !game.gameOver && !game.gameWin;
            leftWindowAnimatronic.classList.toggle('visible', leftWin);
            leftWindowAnimatronic.classList.remove('freddy');

            const rightFreddyWin = game.rightDoor && game.freddy === 3 && !game.gameOver && !game.gameWin;
            const rightChicaWin = game.rightDoor && game.chica === 3 && game.freddy !== 3 && !game.gameOver && !game.gameWin;
            const rightWin = rightFreddyWin || rightChicaWin;
            rightWindowAnimatronic.classList.toggle('visible', rightWin);
            rightWindowAnimatronic.classList.toggle('freddy', rightFreddyWin);
            if (rightChicaWin) rightWindowAnimatronic.classList.remove('freddy');

            // ── WARNING SOUNDS when entering position 2 ──
            const now = game.minute;
            if (game.bonnie === 2 && game.lastWarning.bonnie !== now) {
                game.lastWarning.bonnie = now;
                sound.init();
                sound.warning();
            }
            if (game.chica === 2 && game.lastWarning.chica !== now) {
                game.lastWarning.chica = now;
                sound.init();
                sound.warning();
            }
            if (game.freddy === 2 && game.lastWarning.freddy !== now) {
                game.lastWarning.freddy = now;
                sound.init();
                sound.warning();
            }
        }

        function renderCameraFeed() {
            const cam = game.currentCam;
            const names = {
                stage: 'STAGE',
                dining: 'DINING AREA',
                backstage: 'BACKSTAGE',
                piratecove: 'PIRATE COVE',
                hallway: 'HALLWAY'
            };
            camFeedTitle.textContent = names[cam] || cam.toUpperCase();

            let html = '';
            const posMap = { 0: 'stage', 1: 'dining', 2: 'backstage', 3: 'hallway' };

            if (cam === 'piratecove') {
                const pct = (game.foxy / 3) * 100;
                html += `<div class="pirate-curtain">🦊 FOXY<div class="pirate-progress" style="width:${pct}%;"></div></div>`;
                html += `<p style="color:#aaa;margin-top:12px;font-size:20px;z-index:1;">Stage ${game.foxy}/3</p>`;
                if (game.foxy >= 3) html +=
                    `<p style="color:#ff6644;margin-top:6px;z-index:1;font-size:22px;animation:fadeInOut 0.8s infinite;">⚡ RUNNING ⚡</p>`;
            } else {
                const chars = [
                    { name: 'Bonnie', pos: game.bonnie, side: 'left' },
                    { name: 'Chica', pos: game.chica, side: 'right' },
                    { name: 'Freddy', pos: game.freddy, side: 'right' }
                ];
                chars.forEach(c => {
                    const isHere = posMap[c.pos] === cam;
                    const atDoor = c.pos === 3;
                    let dotClass = 'cam-anim-dot';
                    if (isHere) dotClass += atDoor ? ' at-door' : ' active';
                    html += `<div class="cam-anim-row">
                                <span class="cam-anim-name">${c.name}:</span>
                                <div class="${dotClass}"></div>
                                <span style="color:#666;font-size:14px;z-index:1;">
                                    ${isHere ? (atDoor ? '🔴 AT DOOR' : '📍 PRESENT') : '⚫'}
                                </span>
                            </div>`;
                });
            }
            camDynamicContent.innerHTML = html;
        }

        function updateCameraUI() {
            cameraOverlay.classList.toggle('active', game.cameraUp);
            $('camera-btn').classList.toggle('active-btn', game.cameraUp);
            if (game.cameraUp) renderCameraFeed();
            document.querySelectorAll('.cam-select-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.cam === game.currentCam);
            });
        }

        function updateAll() {
            updateHUD();
            updateDoors();
            updateLights();
            updateAnimatronicVisuals();
            updateCameraUI();
            powerOutOverlay.classList.toggle('active', game.powerOut);
        }

        // ─── triggers ───
        function triggerJumpscare() {
            if (game.gameOver) return;
            game.gameOver = true;
            sound.init();
            sound.jumpscare();
            jumpscareOverlay.classList.add('active');
            const face = document.getElementById('jumpscare-face');
            face.style.animation = 'none';
            void face.offsetHeight;
            face.style.animation = 'zoomIn 0.4s cubic-bezier(0.1,0.8,0.3,1.2) forwards';
        }

        function triggerWin() {
            if (game.gameWin) return;
            game.gameWin = true;
            sound.init();
            sound.win();
            winScreen.classList.add('active');
            game.cameraUp = false;
            game.leftLight = game.rightLight = false;
            updateAll();
        }

        function triggerPowerOut() {
            if (game.powerOut) return;
            game.powerOut = true;
            game.leftDoor = false;
            game.rightDoor = false;
            game.leftLight = false;
            game.rightLight = false;
            game.cameraUp = false;
            game.powerOutMax = Math.floor(Math.random() * 12) + 8;
            game.powerOutTick = 0;
            sound.init();
            sound.powerOut();
            updateAll();
        }

        // ─── retreat mechanics ───
        function applyRetreats() {
            // Left (Bonnie)
            if (game.leftDoor && game.bonnie === 3 && !game.gameOver && !game.gameWin) {
                if (game.leftRetreatThreshold === 0) {
                    game.leftRetreatThreshold = Math.floor(Math.random() * 5) + 3;
                    game.leftRetreatTimer = 0;
                }
                game.leftRetreatTimer++;
                if (game.leftRetreatTimer >= game.leftRetreatThreshold) {
                    game.bonnie = 2;
                    game.leftRetreatTimer = 0;
                    game.leftRetreatThreshold = 0;
                    sound.init();
                    sound.retreat();
                    leftAnimatronic.classList.add('retreating');
                    setTimeout(() => leftAnimatronic.classList.remove('retreating'), 600);
                }
            } else {
                game.leftRetreatTimer = 0;
                game.leftRetreatThreshold = 0;
            }

            // Right (Chica or Freddy)
            const rightAtDoor = game.chica === 3 || game.freddy === 3;
            if (game.rightDoor && rightAtDoor && !game.gameOver && !game.gameWin) {
                if (game.rightRetreatThreshold === 0) {
                    game.rightRetreatThreshold = Math.floor(Math.random() * 5) + 3;
                    game.rightRetreatTimer = 0;
                }
                game.rightRetreatTimer++;
                if (game.rightRetreatTimer >= game.rightRetreatThreshold) {
                    if (game.chica === 3) game.chica = 2;
                    else if (game.freddy === 3) game.freddy = 2;
                    game.rightRetreatTimer = 0;
                    game.rightRetreatThreshold = 0;
                    sound.init();
                    sound.retreat();
                    rightAnimatronic.classList.add('retreating');
                    setTimeout(() => rightAnimatronic.classList.remove('retreating'), 600);
                }
            } else {
                game.rightRetreatTimer = 0;
                game.rightRetreatThreshold = 0;
            }
        }

        // ─── AI movement ───
        function moveAnimatronics() {
            if (game.gameOver || game.gameWin || game.powerOut) return;

            const cfg = getNightConfig();
            const progress = game.minute / 360;
            const move = cfg.baseMove + (0.15 * progress);
            const entry = cfg.entryChance + (0.10 * progress);

            // Bonnie (left)
            if (game.bonnie < 3 && Math.random() < move) {
                if (!(game.bonnie === 2 && game.leftDoor)) game.bonnie++;
            } else if (game.bonnie === 3 && !game.leftDoor && Math.random() < entry) {
                triggerJumpscare();
                return;
            }

            // Chica (right)
            if (game.chica < 3 && Math.random() < move * 0.9) {
                if (!(game.chica === 2 && game.freddy === 3)) game.chica++;
            } else if (game.chica === 3 && !game.rightDoor && Math.random() < entry) {
                if (game.freddy !== 3) { triggerJumpscare(); return; }
            }

            // Freddy (right) - only moves when camera is down
            if (!game.cameraUp && game.freddy < 3 && Math.random() < move * 1.15) {
                if (!(game.freddy === 2 && game.chica === 3)) game.freddy++;
            } else if (game.freddy === 3 && !game.rightDoor && Math.random() < entry * 0.9) {
                triggerJumpscare();
                return;
            }

            // Foxy
            const viewingFoxy = game.cameraUp && game.currentCam === 'piratecove';
            if (!viewingFoxy && game.foxy < 3) {
                if (Math.random() < cfg.foxySpeed + 0.04 * progress) game.foxy++;
            } else if (viewingFoxy && game.foxy > 0) {
                game.foxy = Math.max(0, game.foxy - 1);
            }
            if (game.foxy >= 3 && !game.gameOver) {
                if (!game.leftDoor) {
                    sound.init();
                    sound.foxyRun();
                    triggerJumpscare();
                    return;
                } else {
                    sound.init();
                    sound.foxyRun();
                    game.power = Math.max(0, game.power - 8);
                    game.foxy = 1;
                    updateHUD();
                }
            }

            applyRetreats();
        }

        // ─── game tick ───
        function gameTick() {
            if (!game.started || game.gameOver || game.gameWin) return;

            if (game.powerOut) {
                game.powerOutTick++;
                if (game.powerOutTick >= game.powerOutMax) {
                    triggerJumpscare();
                }
                if (game.minute >= TOTAL_MINUTES) triggerWin();
                updateHUD();
                return;
            }

            game.minute++;
            const cfg = getNightConfig();
            let drain = 0.18 * cfg.drainMult;
            if (game.leftDoor) drain += 0.40 * cfg.drainMult;
            if (game.rightDoor) drain += 0.40 * cfg.drainMult;
            if (game.leftLight) drain += 0.28 * cfg.drainMult;
            if (game.rightLight) drain += 0.28 * cfg.drainMult;
            if (game.cameraUp) drain += 0.22 * cfg.drainMult;
            game.power = Math.max(0, game.power - drain);

            if (game.power <= 0 && !game.powerOut) {
                game.power = 0;
                triggerPowerOut();
                updateAll();
                return;
            }

            moveAnimatronics();

            if (game.minute >= TOTAL_MINUTES) {
                triggerWin();
            }

            updateAll();

            if (game.minute % 8 === 0) {
                sound.init();
                sound.ambient();
            }
        }

        // ─── restart ───
        function restartGame() {
            const prevNight = game.night;
            game = {
                power: 100,
                minute: 0,
                night: prevNight || 1,
                leftDoor: false,
                rightDoor: false,
                leftLight: false,
                rightLight: false,
                cameraUp: false,
                currentCam: 'stage',
                bonnie: 0,
                chica: 0,
                freddy: 0,
                foxy: 0,
                gameOver: false,
                gameWin: false,
                powerOut: false,
                powerOutTick: 0,
                powerOutMax: 0,
                started: true,
                leftRetreatTimer: 0,
                leftRetreatThreshold: 0,
                rightRetreatTimer: 0,
                rightRetreatThreshold: 0,
                lastWarning: { bonnie: 0, chica: 0, freddy: 0 },
                nightConfigs: {
                    1: { baseMove: 0.06, entryChance: 0.08, foxySpeed: 0.14, drainMult: 0.9 },
                    2: { baseMove: 0.10, entryChance: 0.14, foxySpeed: 0.20, drainMult: 1.0 },
                    3: { baseMove: 0.16, entryChance: 0.20, foxySpeed: 0.28, drainMult: 1.1 },
                    4: { baseMove: 0.22, entryChance: 0.28, foxySpeed: 0.35, drainMult: 1.2 },
                    5: { baseMove: 0.30, entryChance: 0.38, foxySpeed: 0.44, drainMult: 1.35 }
                }
            };
            jumpscareOverlay.classList.remove('active');
            winScreen.classList.remove('active');
            powerOutOverlay.classList.remove('active');
            leftAnimatronic.classList.remove('retreating');
            rightAnimatronic.classList.remove('retreating');
            updateAll();
        }

        // ─── start game ───
        function startGame(night) {
            sound.init();
            game.night = night || 1;
            game.started = true;
            game.power = 100;
            game.minute = 0;
            game.bonnie = 0;
            game.chica = 0;
            game.freddy = 0;
            game.foxy = 0;
            game.leftDoor = false;
            game.rightDoor = false;
            game.leftLight = false;
            game.rightLight = false;
            game.cameraUp = false;
            game.gameOver = false;
            game.gameWin = false;
            game.powerOut = false;
            game.powerOutTick = 0;
            game.powerOutMax = 0;
            game.leftRetreatTimer = 0;
            game.leftRetreatThreshold = 0;
            game.rightRetreatTimer = 0;
            game.rightRetreatThreshold = 0;
            game.lastWarning = { bonnie: 0, chica: 0, freddy: 0 };
            startScreen.classList.add('hidden');
            jumpscareOverlay.classList.remove('active');
            winScreen.classList.remove('active');
            powerOutOverlay.classList.remove('active');
            leftAnimatronic.classList.remove('retreating');
            rightAnimatronic.classList.remove('retreating');
            updateAll();
            if (!window._ambientInterval) {
                window._ambientInterval = setInterval(() => {
                    if (game.started && !game.gameOver && !game.gameWin && !game.powerOut) {
                        sound.init();
                        sound.ambient();
                    }
                }, 2800);
            }
        }

        // ─── bind controls ───
        function bindControls() {
            $('left-door-btn').addEventListener('click', () => {
                if (!game.started || game.gameOver || game.gameWin || game.powerOut) return;
                sound.init();
                sound.door();
                game.leftDoor = !game.leftDoor;
                if (game.leftDoor) game.leftLight = false;
                updateAll();
            });
            $('right-door-btn').addEventListener('click', () => {
                if (!game.started || game.gameOver || game.gameWin || game.powerOut) return;
                sound.init();
                sound.door();
                game.rightDoor = !game.rightDoor;
                if (game.rightDoor) game.rightLight = false;
                updateAll();
            });
            $('left-light-btn').addEventListener('click', () => {
                if (!game.started || game.gameOver || game.gameWin || game.powerOut || game.leftDoor) return;
                sound.init();
                sound.light();
                game.leftLight = !game.leftLight;
                updateAll();
            });
            $('right-light-btn').addEventListener('click', () => {
                if (!game.started || game.gameOver || game.gameWin || game.powerOut || game.rightDoor) return;
                sound.init();
                sound.light();
                game.rightLight = !game.rightLight;
                updateAll();
            });
            $('camera-btn').addEventListener('click', () => {
                if (!game.started || game.gameOver || game.gameWin || game.powerOut) return;
                sound.init();
                if (game.cameraUp) sound.cameraDown();
                else sound.cameraUp();
                game.cameraUp = !game.cameraUp;
                if (game.cameraUp) { game.leftLight = false;
                    game.rightLight = false; }
                updateAll();
            });
            document.querySelectorAll('.cam-select-btn').forEach(b => {
                b.addEventListener('click', (e) => {
                    if (!game.cameraUp) return;
                    game.currentCam = e.target.dataset.cam;
                    sound.init();
                    sound.click();
                    renderCameraFeed();
                    document.querySelectorAll('.cam-select-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });
            restartBtn.addEventListener('click', () => { sound.init();
                sound.click();
                restartGame(); });
            winRestartBtn.addEventListener('click', () => { sound.init();
                sound.click();
                restartGame(); });

            document.addEventListener('keydown', (e) => {
                if (!game.started) return;
                if (game.gameOver || game.gameWin) {
                    if (e.key.toLowerCase() === 'r') { sound.init();
                        sound.click();
                        restartGame(); }
                    return;
                }
                const key = e.key.toLowerCase();
                if (key === 'a' || key === 'arrowleft') { e.preventDefault();
                    $('left-door-btn').click(); } else if (key === 'd' || key === 'arrowright') { e
                        .preventDefault();
                    $('right-door-btn').click(); } else if (key === 'q') { e.preventDefault();
                    $('left-light-btn').click(); } else if (key === 'e') { e.preventDefault();
                    $('right-light-btn').click(); } else if (key === 'w' || key === ' ') { e.preventDefault();
                    $('camera-btn').click(); } else if (game.cameraUp && (key >= '1' && key <= '5')) {
                    const cams = ['stage', 'dining', 'backstage', 'piratecove', 'hallway'];
                    const idx = parseInt(key) - 1;
                    if (idx < cams.length) {
                        game.currentCam = cams[idx];
                        sound.init();
                        sound.click();
                        renderCameraFeed();
                        updateCameraUI();
                        document.querySelectorAll('.cam-select-btn').forEach(btn => {
                            btn.classList.toggle('active', btn.dataset.cam === game.currentCam);
                        });
                    }
                }
            });
        }

        // ─── night selection ───
        document.querySelectorAll('.night-select-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.night-select-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        startBtn.addEventListener('click', () => {
            const active = document.querySelector('.night-select-btn.active');
            const night = active ? parseInt(active.dataset.night) : 1;
            sound.init();
            sound.click();
            startGame(night);
        });

        // ─── init ───
        bindControls();
        updateAll();
        setInterval(gameTick, TICK_MS);

        document.addEventListener('click', () => sound.init(), { once: true });
        document.addEventListener('touchstart', () => sound.init(), { once: true });
    </script>
</body>
</html>
